function renderEducation(){document.getElementById("tab-education").innerHTML='<div class="section-title">教育背景</div><div class="body-text">'+data.education.map(e=>'<div>'+'<strong>'+e.school+'</strong>　'+e.degree+(e.detail?'　'+e.detail:'')+'</div>').join("")+'</div><div class="divider"></div><div class="section-title">业界经历</div><div class="body-text">波士顿咨询（BCG）、字节跳动、深圳市发改委</div><div class="divider"></div><div class="section-title">语言能力</div><div class="body-text">雅思 8 分：阅读 9、听力 9、口语 7、写作 7.5</div>'}
function renderAdmissions(){const sm={};allAdmissions.forEach(a=>{if(!sm[a.school])sm[a.school]={items:[],flag:a.flag,qs:qsRanking[a.school]||999};sm[a.school].items.push(a)});const so=Object.keys(sm).sort((a,b)=>sm[a].qs-sm[b].qs);const fi=so.filter(s=>{const g=sm[s];if(schoolFilter.length>0){const allFlags=schoolFilter.flatMap(k=>{const r=regionTabs.find(x=>x.key===k);return r?.flags||[]});if(!allFlags.includes(g.flag))return false}return true});const sOpts=[{key:"all",label:"全部专业",icon:""},...Object.entries(data.subjectGroups).map(([k,v])=>({key:k,label:k,icon:v.icon,count:allAdmissions.filter(a=>v.fields.includes(a.field)).length})).sort((a,b)=>b.count-a.count||(a.key==="计算社科与数字人文"?-1:b.key==="计算社科与数字人文"?1:0))];let lb=["all","博士","硕士","本科"].map(l=>{const a=l==="all"?levelFilter.length===0:levelFilter.includes(l);return'<button class="filter-btn" style="'+(a?'border-color:#6B7280;background:#6B728010;color:#6B7280':'')+'" onclick="toggleLevel(\''+l+'\')">'+(l==="all"?"全部级别":l)+'</button>'}).join("");let rb=[{key:"all",label:"全部地区"},...regionTabs.filter(r=>r.key!=="all")].map(r=>{const a=r.key==="all"?schoolFilter.length===0:schoolFilter.includes(r.key);return'<button class="filter-btn" style="'+(a?'border-color:#6B7280;background:#6B728010;color:#6B7280':'')+'" onclick="toggleRegion(\''+r.key+'\')">'+r.label+'</button>'}).join("");let sb=sOpts.map(s=>{const a=s.key==="all"?subjectFilter.length===0:subjectFilter.includes(s.key);const c=data.subjectGroups[s.key]?.color||"#6B7280";return'<button class="filter-btn" style="'+(a?'border-color:'+c+';background:'+c+'18;color:'+c:'')+'" onclick="toggleSubject(\''+s.key+'\')">'+(s.icon?s.icon+' ':'')+s.label+'</button>'}).join("");let sh="";fi.forEach((school,si)=>{const g=sm[school];let items=g.items;if(levelFilter.length>0){items=items.filter(a=>levelFilter.includes(a.level))}if(subjectFilter.length>0){const allFields=subjectFilter.flatMap(k=>(data.subjectGroups[k]?.fields||[]));items=items.filter(a=>allFields.includes(a.field))}if(!items.length)return;let qb="";if(g.qs<=50){const c=g.qs<=50?"#DC2626":"#D97706";const bg=g.qs<=50?"#FEF2F2":"#FFFBEB";const bc=g.qs<=50?"#FECACA":"#FDE68A";qb='<span class="qs-badge" style="color:'+c+';background:'+bg+';border:1px solid '+bc+'">QS世界第'+g.qs+'</span>'}sh+='<div class="school-group" style="animation:fadeSlideIn 0.3s ease '+si*0.05+'s both"><div class="school-header"><span style="font-size:22px">'+g.flag+'</span><span class="school-name">'+school+'</span>'+qb+'<span class="count-badge">'+items.length+' 枚录取</span></div>'+items.map((item,i)=>makeCard(item,i)).join("")+'</div>'});document.getElementById("tab-admissions").innerHTML='<div class="section-title">辅导内容与模式</div><div class="body-text" style="margin-bottom:6px"><div>深度定制辅导，涵盖申请全套流程和完整文书：</div><div>战略规划、选校定位、主文书（PS和SOP）、研究计划（RP）、写作样本（WS）、简历、推荐信、面试辅导等</div><div>与中介相比，同等品质辅导价格仅约47%</div></div><div class="divider"></div><div class="section-title">辅导所获Offer</div><div class="filter-row">'+lb+'</div><div class="filter-row">'+rb+'</div><div class="filter-row last">'+sb+'</div>'+sh}
window.toggleLevel=function(v){if(v==="all"){levelFilter=[]}else{const i=levelFilter.indexOf(v);if(i>-1)levelFilter.splice(i,1);else levelFilter.push(v)}renderAdmissions()};window.toggleRegion=function(v){if(v==="all"){schoolFilter=[]}else{const i=schoolFilter.indexOf(v);if(i>-1)schoolFilter.splice(i,1);else schoolFilter.push(v)}renderAdmissions()};window.toggleSubject=function(v){if(v==="all"){subjectFilter=[]}else{const i=subjectFilter.indexOf(v);if(i>-1)subjectFilter.splice(i,1);else subjectFilter.push(v)}renderAdmissions()};window.switchTab=switchTab;
function renderResearch(){document.getElementById("tab-research").innerHTML='<div class="section-title">辅导范围</div><div class="body-text">涵盖本科、硕士、博士各阶段：SSCI发表、学术会议、科研项目、学位论文、课程论文</div><div class="divider"></div><div class="section-title">导师资历</div><div class="body-text" style="line-height:2.2"><div>伦敦政经博士生、耶鲁访问博士生</div><div>Nature子刊发表和审稿，SSCI 1区、中科院1区，跨学科社会科学排名第2、多学科人文科学排名第1</div><div>获取56万研究经费，来自普林斯顿、伦敦政经、港中文、谷歌、OpenAI等</div><div>受邀参加多学科顶级会议</div><div>教授课程1100+学生</div><div>QS世界大学排名评委</div><div>英国政府跨学科研究评委</div></div><div class="divider"></div><div class="section-title">研究方法与工具</div><div class="body-text"><div>研究设计、定量方法、定性方法、计算方法、实验方法</div><div>R、Python、假设检验、回归分析、机器学习、因果推断、云计算、AI数字实验、档案阅读</div></div><div class="divider"></div><div class="section-title">开设课程</div><div class="body-text">人文社科与人工智能，人文社科研究方法，人工智能、社会与治理，服饰文化与消费社会学</div><div class="divider"></div><div class="section-title">辅导案例</div><div class="body-text"><div>学生来自牛津、伦敦政经、北大、顶级国际高中等，目标哈耶普斯麻和牛剑等顶级院校</div><div>部分成果：11篇多学科顶级会议接收（ICA, APSA, ASA, IC2S2等）、John Locke国际英文论文比赛入围、LSE本科论文最高分</div><div>注：为保护同学隐私，更多辅导成果和细节在咨询时提供</div></div><div class="divider"></div><div class="section-title">辅导内容</div><div class="body-text">根据同学基础和目标，定制全环节辅导计划：构思、设计、文献、假说、方法、润色</div><div class="divider"></div><div class="section-title">辅导模式</div><div class="body-text"><div>随同学需要具体定制方案和价格</div><div>定制化全程辅导，没有中介赚差价，省去销售、推广、店面等成本</div><div>与中介相比，同等品质辅导价格仅约43%</div></div>'}
renderOverview();renderEducation();renderAdmissions();renderResearch();renderTabs();
</script>
